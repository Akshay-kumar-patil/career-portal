<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cover Letter</title>
<style>
    body { font-family: 'Georgia', serif; font-size: 11pt; line-height: 1.8; max-width: 700px; margin: 0 auto; padding: 60px 40px; color: #222; }
    .date { color: #888; margin-bottom: 20px; }
    p { margin-bottom: 14px; }
    .signature { margin-top: 30px; }
</style>
</head>
<body>
<div class="date">{{ date | default('') }}</div>
<p>Dear Hiring Manager,</p>
{{ content | default('') }}
<div class="signature">
<p>Sincerely,</p>
<p><strong>{{ name | default('') }}</strong></p>
</div>
</body>
</html>
