version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env
    environment:
      - PYTHONPATH=/app
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    depends_on:
      - backend
    environment:
      - PYTHONPATH=/app
      - NEXT_PUBLIC_API_URL=http://backend:8000 # Helpful reference if frontend communicates via URL
    restart: unless-stopped

volumes:
  data:
